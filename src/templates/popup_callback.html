<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signing In...</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 20px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #111827;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        .spinner {
            border: 4px solid rgba(250, 204, 21, 0.2);
            border-top: 4px solid #facc15;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        .message {
            font-size: 16px;
            color: #e5e7eb;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <p class="message">Signing you in...</p>
    </div>
    <script>
        // Notify opener (parent) that auth succeeded, then close popup.
        try{
            if (window.opener && !window.opener.closed) {
                // Use origin for security; if it fails, still attempt to postMessage
                window.opener.postMessage({ type: 'oauth_success' }, window.location.origin);
            }
        }catch(_){
            try{ window.opener.postMessage({ type: 'oauth_success' }, '*') }catch(__){}
        }

        // Close shortly after notifying parent
        setTimeout(() => {
            window.close();
        }, 500);
    </script>
</body>
</html>

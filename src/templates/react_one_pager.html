<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Athoryn - Royalty Hub</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/react_one_pager.css') }}">
</head>

<body>
<div class="app">
  <div class="topbar">
    <a class="brand" href="/">Athoryn - Royalty Hub</a>
    <div class="nav">
      <a href="/reporting" id="reportingLink">Reporting</a>
      <span id="userChip" class="user-chip"></span>
      <button id="loginBtn">Login</button>
      <button id="logoutBtn" class="hidden">Logout</button>
    </div>
  </div>

  <main class="main">
    <section id="landingPage" class="page">
      <div id="chatArea" class="chat-area"></div>

      <div class="composer-wrap">
        <div id="composer" class="composer">
          <div id="filePill" class="file-pill">
            <span>📄</span>
            <span id="fileName" class="file-name"></span>
            <button id="removeFileBtn" class="file-remove" type="button">×</button>
          </div>
          <textarea id="query" placeholder="Ask AI, or drag an Excel file here. Press Enter to submit. Shift+Enter for new line."></textarea>
          <button id="sendBtn" class="send-btn" type="button">↑</button>
        </div>
        <div class="hint">Drop KDP royalty Excel files here, ask a question, or do both together.</div>
      </div>
    </section>

    <section id="reportingPage" class="page">
      <div class="reporting-shell">
        <div class="reporting-header">
          <div class="reporting-title">Reporting</div>

          <div class="filters">
            <div class="filter">
              <label>Report Month</label>
              <input id="filter_report_month" type="date">
            </div>
            <div class="filter">
              <label>Title Contains</label>
              <input id="filter_normalized_title" placeholder="example book">
            </div>
            <div class="filter">
              <label>Marketplace</label>
              <input id="filter_marketplace" placeholder="Amazon.com">
            </div>
            <div class="filter">
              <label>Currency</label>
              <input id="filter_currency" placeholder="USD">
            </div>
            <div class="filter-actions">
              <button class="primary-btn" id="applyFiltersBtn">Apply</button>
              <button class="secondary-btn" id="clearFiltersBtn">Clear</button>
            </div>
          </div>
        </div>

        <div class="reporting-content">
          <div class="pagination">
            <div id="reportingSummary">Loading records...</div>
            <div class="pager-buttons">
              <button class="secondary-btn" id="prevPageBtn">Prev</button>
              <button class="secondary-btn" id="nextPageBtn">Next</button>
            </div>
          </div>
          <div id="reportingStatus"></div>
          <div id="reportingTable" class="reporting-table-wrap"></div>
        </div>
      </div>
    </section>
  </main>
</div>

<script src="{{ url_for('static', filename='js/react_one_pager.js') }}"></script>
</body>
</html>

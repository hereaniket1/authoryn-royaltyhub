<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Athoryn - Royalty Hub</title>

  <style>
    * { box-sizing: border-box; }

    :root {
      --ink: #0b0b0b;
      --gold: #facc15;
      --gold-soft: #fff7cc;
      --paper: #fffaf0;
      --muted: #6b7280;
      --border: #e5e7eb;
      --bg: #f8fafc;
      --green: #10b981;
      --orange: #f59e0b;
      --blue: #2563eb;
    }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: #111827;
    }

    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, #fffdf5 0%, #f8fafc 38%, #f3f4f6 100%);
    }

    .topbar {
      height: 60px;
      padding: 0 22px;
      background: #050505;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(250, 204, 21, .25);
      flex-shrink: 0;
    }

    .brand {
      color: var(--gold);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: .5px;
      text-decoration: none;
      cursor: pointer;
      text-shadow: 0 0 18px rgba(250, 204, 21, .24);
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav a, .nav button {
      color: #f9fafb;
      background: transparent;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 999px;
      padding: 8px 13px;
      text-decoration: none;
      font-size: 13px;
      cursor: pointer;
      transition: .18s ease;
    }

    .nav a:hover, .nav button:hover {
      border-color: rgba(250, 204, 21, .65);
      color: var(--gold);
      background: rgba(250, 204, 21, .08);
    }

    .user-chip {
      color: #d1d5db;
      font-size: 13px;
      max-width: 240px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .main {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .page {
      height: 100%;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    .page.active { display: flex; }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 18px 156px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message {
      max-width: min(860px, 90vw);
      padding: 13px 15px;
      border-radius: 16px;
      line-height: 1.45;
      white-space: pre-wrap;
      animation: fadeUp .24s ease-out;
      box-shadow: 0 8px 18px rgba(15, 23, 42, .06);
    }

    .user {
      align-self: flex-end;
      background: #111827;
      color: white;
      border-bottom-right-radius: 5px;
    }

    .assistant {
      align-self: flex-start;
      background: white;
      color: #111827;
      border: 1px solid var(--border);
      border-bottom-left-radius: 5px;
    }

    .composer-wrap {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 18px 16px 24px;
      background: linear-gradient(to top, rgba(248,250,252,1) 74%, rgba(248,250,252,0));
      z-index: 20;
    }

    .composer {
      width: min(920px, calc(100vw - 32px));
      margin: 0 auto;
      background: white;
      border: 1px solid #d1d5db;
      border-radius: 24px;
      box-shadow: 0 18px 42px rgba(15, 23, 42, .16);
      padding: 10px 56px 10px 12px;
      position: relative;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }

    .composer.drag-over {
      border: 2px dashed var(--blue);
      background: #eff6ff;
    }

    .file-pill {
      display: none;
      align-items: center;
      gap: 8px;
      width: fit-content;
      max-width: 100%;
      padding: 7px 10px;
      margin: 0 0 8px 2px;
      background: #111827;
      color: var(--gold);
      border: 1px solid rgba(250, 204, 21, .35);
      border-radius: 12px;
      font-size: 13px;
      animation: fadeUp .2s ease-out;
    }

    .file-name {
      max-width: 680px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-remove {
      border: none;
      background: transparent;
      color: var(--gold);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      padding: 0 2px;
    }

    textarea {
      width: 100%;
      min-height: 56px;
      max-height: 160px;
      resize: none;
      border: none;
      outline: none;
      font-size: 15px;
      line-height: 1.45;
      font-family: inherit;
      background: transparent;
      color: #111827;
      padding: 5px 0;
    }

    .send-btn {
      position: absolute;
      right: 12px;
      bottom: 12px;
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: none;
      background: #111827;
      color: var(--gold);
      cursor: pointer;
      font-size: 18px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: .18s ease;
    }

    .send-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(0,0,0,.18);
      background: #000;
    }

    .hint {
      width: min(920px, calc(100vw - 32px));
      margin: 8px auto 0;
      color: #6b7280;
      font-size: 12px;
      text-align: center;
    }

    .result-block {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      animation: fadeUp .28s ease-out;
    }

    .result-note {
      margin-bottom: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 14px;
      border: 1px solid var(--border);
      background: white;
      box-shadow: 0 8px 20px rgba(15, 23, 42, .05);
    }

    .result-warning {
      border-color: var(--orange);
      background: #fffbeb;
      color: #92400e;
    }

    .result-success {
      border-color: var(--green);
      background: #ecfdf5;
      color: #065f46;
    }

    .table-card {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: white;
      box-shadow: 0 18px 40px rgba(15, 23, 42, .10);
      overflow: hidden;
    }

    .table-toolbar {
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid #eef2f7;
      background: #fff;
    }

    .table-title {
      font-weight: 800;
      font-size: 14px;
      color: #111827;
    }

    .table-meta {
      font-size: 12px;
      color: var(--muted);
    }

    .table-scroll {
      max-height: 48vh;
      overflow: auto;
    }

    table {
      width: max-content;
      min-width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 12px;
    }

    th, td {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 8px 10px;
      text-align: left;
      white-space: nowrap;
      vertical-align: top;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #111827;
      color: var(--gold);
      font-weight: 800;
    }

    tr:hover td { background: #fff7cc; }

    .reporting-shell {
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .reporting-header {
      padding: 18px 22px 12px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(10px);
      flex-shrink: 0;
    }

    .reporting-title {
      font-size: 24px;
      font-weight: 850;
      margin-bottom: 12px;
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(6, minmax(130px, 1fr));
      gap: 10px;
      align-items: end;
    }

    .filter label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #4b5563;
      margin-bottom: 5px;
    }

    .filter input {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 13px;
      outline: none;
      background: white;
    }

    .filter input:focus {
      border-color: #111827;
      box-shadow: 0 0 0 3px rgba(250, 204, 21, .25);
    }

    .filter-actions {
      display: flex;
      gap: 8px;
    }

    .primary-btn, .secondary-btn {
      border: none;
      border-radius: 10px;
      padding: 10px 13px;
      font-weight: 750;
      cursor: pointer;
      white-space: nowrap;
    }

    .primary-btn {
      background: #111827;
      color: var(--gold);
    }

    .secondary-btn {
      background: #e5e7eb;
      color: #111827;
    }

    .reporting-content {
      flex: 1;
      overflow: hidden;
      padding: 16px 22px 22px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .reporting-table-wrap {
      flex: 1;
      overflow: hidden;
      animation: fadeUp .28s ease-out;
    }

    .pagination {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 13px;
      color: #4b5563;
    }

    .pager-buttons {
      display: flex;
      gap: 8px;
    }

    .hidden { display: none !important; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 980px) {
      .filters { grid-template-columns: repeat(2, 1fr); }
      .topbar { padding: 0 14px; }
      .brand { font-size: 18px; }
      .user-chip { display: none; }
    }
  </style>
</head>

<body>
<div class="app">
  <div class="topbar">
    <a class="brand" href="/">Athoryn - Royalty Hub</a>
    <div class="nav">
      <a href="/reporting" id="reportingLink">Reporting</a>
      <span id="userChip" class="user-chip"></span>
      <button id="loginBtn">Login</button>
      <button id="logoutBtn" class="hidden">Logout</button>
    </div>
  </div>

  <main class="main">
    <section id="landingPage" class="page">
      <div id="chatArea" class="chat-area"></div>

      <div class="composer-wrap">
        <div id="composer" class="composer">
          <div id="filePill" class="file-pill">
            <span>📄</span>
            <span id="fileName" class="file-name"></span>
            <button id="removeFileBtn" class="file-remove" type="button">×</button>
          </div>
          <textarea id="query" placeholder="Ask AI, or drag an Excel file here. Press Enter to submit. Shift+Enter for new line."></textarea>
          <button id="sendBtn" class="send-btn" type="button">↑</button>
        </div>
        <div class="hint">Drop KDP royalty Excel files here, ask a question, or do both together.</div>
      </div>
    </section>

    <section id="reportingPage" class="page">
      <div class="reporting-shell">
        <div class="reporting-header">
          <div class="reporting-title">Reporting</div>

          <div class="filters">
            <div class="filter">
              <label>Report Month</label>
              <input id="filter_report_month" type="date">
            </div>
            <div class="filter">
              <label>Title Contains</label>
              <input id="filter_normalized_title" placeholder="example book">
            </div>
            <div class="filter">
              <label>Marketplace</label>
              <input id="filter_marketplace" placeholder="Amazon.com">
            </div>
            <div class="filter">
              <label>Currency</label>
              <input id="filter_currency" placeholder="USD">
            </div>
            <div class="filter-actions">
              <button class="primary-btn" id="applyFiltersBtn">Apply</button>
              <button class="secondary-btn" id="clearFiltersBtn">Clear</button>
            </div>
          </div>
        </div>

        <div class="reporting-content">
          <div class="pagination">
            <div id="reportingSummary">Loading records...</div>
            <div class="pager-buttons">
              <button class="secondary-btn" id="prevPageBtn">Prev</button>
              <button class="secondary-btn" id="nextPageBtn">Next</button>
            </div>
          </div>
          <div id="reportingStatus"></div>
          <div id="reportingTable" class="reporting-table-wrap"></div>
        </div>
      </div>
    </section>
  </main>
</div>

<script>
  const ROYALTY_TABLE_COLUMNS = [
    { key: "title", label: "Title" },
    { key: "author", label: "Author" },
    { key: "asin_isbn", label: "ASIN / ISBN" },
    { key: "marketplace", label: "Marketplace" },
    { key: "country_code", label: "Country" },
    { key: "units_sold", label: "Units Sold" },
    { key: "units_refunded", label: "Units Refunded" },
    { key: "net_units_sold", label: "Net Units Sold / KENP" },
    { key: "royalty_type", label: "Royalty Type" },
    { key: "payout_plan", label: "Payout Plan" },
    { key: "currency", label: "Currency" },
    { key: "avg_list_price_without_tax", label: "Avg. List Price (No Tax)" },
    { key: "avg_offer_price_without_tax", label: "Avg. Offer Price (No Tax)" },
    { key: "avg_file_size_mb", label: "Avg. File Size (MB)" },
    { key: "avg_delivery_manufacturing_cost", label: "Avg. Delivery / Manufacturing Cost" },
    { key: "earnings", label: "Earnings" },
    { key: "base_currency", label: "Base Currency" },
    { key: "earnings_in_base_currency", label: "Earnings in Base Currency" },
    { key: "fx_rate", label: "FX Rate" },
    { key: "created_at", label: "Created At" },
    { key: "updated_at", label: "Updated At" }
  ];

  const REPORTING_TABLE_COLUMNS = [
    { key: "title", label: "Title" },
    { key: "author", label: "Author" },
    { key: "marketplace", label: "Marketplace" },
    { key: "country_code", label: "Country" },
    { key: "units_sold", label: "Units Sold" },
    { key: "units_refunded", label: "Units Refunded" },
    { key: "royalty_type", label: "Royalty Type" },
    { key: "payout_plan", label: "Payout Plan" },
    { key: "net_units_sold", label: "Net Units Sold / KENP" },
    { key: "currency", label: "Currency" },
    { key: "base_currency", label: "Base Currency" },
    { key: "earnings", label: "Earnings" },
    { key: "earnings_in_base_currency", label: "Earnings in Base Currency" },
    { key: "avg_list_price_without_tax", label: "Avg. List Price (No Tax)" },
    { key: "avg_offer_price_without_tax", label: "Avg. Offer Price (No Tax)" },
    { key: "avg_file_size_mb", label: "Avg. File Size (MB)" },
    { key: "avg_delivery_manufacturing_cost", label: "Avg. Delivery / Manufacturing Cost" }
  ];



  const reportingFilters = [
    "report_month",
    "normalized_title",
    "title",
    "author",
    "marketplace",
    "country_code",
    "units_sold",
    "units_refunded",
    "royalty_type",
    "payout_plan",
    "net_units_sold",
    "currency",
    "base_currency",
    "earnings",
    "earnings_in_base_currency",
    "avg_list_price_without_tax",
    "avg_offer_price_without_tax",
    "avg_file_size_mb",
    "avg_delivery_manufacturing_cost"
  ];

  const landingPage = document.getElementById("landingPage");
  const reportingPage = document.getElementById("reportingPage");
  const chatArea = document.getElementById("chatArea");
  const queryEl = document.getElementById("query");
  const composer = document.getElementById("composer");
  const sendBtn = document.getElementById("sendBtn");
  const filePill = document.getElementById("filePill");
  const fileName = document.getElementById("fileName");
  const removeFileBtn = document.getElementById("removeFileBtn");
  const loginBtn = document.getElementById("loginBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  const userChip = document.getElementById("userChip");

  let draggedFile = null;
  let currentUser = null;
  let reportingPageNo = 1;
  let reportingTotalPages = 1;
  let reportingSortColumn = "";
  let reportingSortDirection = "asc";

  function isReportingRoute(){
    return window.location.pathname === "/reporting";
  }

  function showCorrectPage(){
    if(isReportingRoute()){
      landingPage.classList.remove("active");
      reportingPage.classList.add("active");
      loadReportingData(1);
    } else {
      reportingPage.classList.remove("active");
      landingPage.classList.add("active");
      setTimeout(() => queryEl && queryEl.focus(), 50);
    }
  }

  function formatCell(value, key){
    if(value === null || value === undefined || value === "") return "—";

    if(key === "created_at" || key === "updated_at"){
      const d = new Date(value);
      return Number.isNaN(d.getTime()) ? String(value) : d.toLocaleString();
    }

    const numeric = new Set([
      "units_sold", "units_refunded", "net_units_sold",
      "avg_list_price_without_tax", "avg_offer_price_without_tax",
      "avg_file_size_mb", "avg_delivery_manufacturing_cost",
      "earnings", "earnings_in_base_currency", "fx_rate"
    ]);

    if(numeric.has(key)){
      const n = Number(value);
      return Number.isNaN(n) ? String(value) : n.toLocaleString(undefined, { maximumFractionDigits: 4 });
    }

    return String(value);
  }

  function renderTable(records, title, meta){
    if(!records || records.length === 0){
      return `
        <div class="table-card">
          <div class="table-toolbar">
            <span class="table-title">${title || "Records"}</span>
            <span class="table-meta">${meta || ""}</span>
          </div>
          <div style="padding:16px;color:#6b7280;">No records found.</div>
        </div>`;
    }

    return `
      <div class="table-card">
        <div class="table-toolbar">
          <span class="table-title">${title || "Records"}</span>
          <span class="table-meta">${meta || records.length + " records"}</span>
        </div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>${ROYALTY_TABLE_COLUMNS.map(c => `<th>${c.label}</th>`).join("")}</tr>
            </thead>
            <tbody>
              ${records.map(row => `
                <tr>${ROYALTY_TABLE_COLUMNS.map(c => `<td>${formatCell(row[c.key], c.key)}</td>`).join("")}</tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      </div>`;
  }


  function humanizeDynamicColumn(key){
    const labels = {
      title: "Title",
      author: "Author",
      asin_isbn: "ASIN / ISBN",
      marketplace: "Marketplace",
      country_code: "Country",
      units_sold: "Units Sold",
      units_refunded: "Units Refunded",
      net_units_sold: "Net Units Sold / KENP",
      royalty_type: "Royalty Type",
      payout_plan: "Payout Plan",
      currency: "Currency",
      avg_list_price_without_tax: "Avg. List Price (No Tax)",
      avg_offer_price_without_tax: "Avg. Offer Price (No Tax)",
      avg_file_size_mb: "Avg. File Size (MB)",
      avg_delivery_manufacturing_cost: "Avg. Delivery / Manufacturing Cost",
      earnings: "Earnings",
      base_currency: "Base Currency",
      earnings_in_base_currency: "Earnings in Base Currency",
      fx_rate: "FX Rate",
      created_at: "Created At",
      updated_at: "Updated At"
    };

    return labels[key] || String(key)
      .replace(/_/g, " ")
      .replace(/\b\w/g, char => char.toUpperCase());
  }

  function formatDynamicCell(value, key){
    if(value === null || value === undefined || value === "") return "—";

    if(key === "created_at" || key === "updated_at"){
      const d = new Date(value);
      return Number.isNaN(d.getTime()) ? String(value) : d.toLocaleString();
    }

    const numericKeys = new Set([
      "units_sold", "units_refunded", "net_units_sold",
      "avg_list_price_without_tax", "avg_offer_price_without_tax",
      "avg_file_size_mb", "avg_delivery_manufacturing_cost",
      "earnings", "earnings_in_base_currency", "fx_rate"
    ]);

    if(numericKeys.has(key)){
      const n = Number(value);
      return Number.isNaN(n) ? String(value) : n.toLocaleString(undefined, { maximumFractionDigits: 4 });
    }

    return String(value);
  }

  function renderDynamicResultTable(records, title, meta){
    if(!records || records.length === 0){
      return `
        <div class="table-card">
          <div class="table-toolbar">
            <span class="table-title">${title || "Records"}</span>
            <span class="table-meta">${meta || ""}</span>
          </div>
          <div style="padding:16px;color:#6b7280;">No records found.</div>
        </div>`;
    }

    const keys = [];
    records.forEach(row => {
      Object.keys(row || {}).forEach(key => {
        if(!keys.includes(key)) keys.push(key);
      });
    });

    return `
      <div class="table-card">
        <div class="table-toolbar">
          <span class="table-title">${title || "Records"}</span>
          <span class="table-meta">${meta || records.length + " records"}</span>
        </div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>${keys.map(key => `<th>${humanizeDynamicColumn(key)}</th>`).join("")}</tr>
            </thead>
            <tbody>
              ${records.map(row => `
                <tr>${keys.map(key => `<td>${formatDynamicCell(row[key], key)}</td>`).join("")}</tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      </div>`;
  }

  function appendDynamicResultBlock({message, type, records, title, meta}){
    const block = document.createElement("div");
    block.className = "result-block";

    let html = "";
    if(message){
      html += `<div class="result-note ${type === "success" ? "result-success" : "result-warning"}">${message}</div>`;
    }
    if(records){
      html += renderDynamicResultTable(records, title, meta);
    }

    block.innerHTML = html;
    chatArea.appendChild(block);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function addMessage(text, type){
    const div = document.createElement("div");
    div.className = "message " + type;
    div.innerText = text;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function appendResultBlock({message, type, records, title, meta}){
    const block = document.createElement("div");
    block.className = "result-block";

    let html = "";
    if(message){
      html += `<div class="result-note ${type === "success" ? "result-success" : "result-warning"}">${message}</div>`;
    }
    if(records){
      html += renderTable(records, title, meta);
    }

    block.innerHTML = html;
    chatArea.appendChild(block);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function getUploadData(response){
    if(!response) return null;
    if(response.results && response.results.data) return response.results.data;
    if(response.results) return response.results;
    if(response.data) return response.data;
    return response;
  }

  function getAIContent(data){
    if(!data) return "No AI response returned.";
    if(data.choices && data.choices[0] && data.choices[0].message){
      return data.choices[0].message.content || "No AI response returned.";
    }
    if(data.answer) return data.answer;
    if(data.content) return data.content;
    if(data.message) return data.message;
    return JSON.stringify(data, null, 2);
  }

  function showFile(file){
    draggedFile = file;
    if(file){
      fileName.innerText = file.name;
      filePill.style.display = "flex";
    } else {
      fileName.innerText = "";
      filePill.style.display = "none";
    }
    queryEl.focus();
  }

  async function checkAuth(){
    try {
      const res = await fetch("/auth/me");
      const data = await res.json();

      if(data.authenticated){
        currentUser = data.user;
        userChip.innerText = data.user.email || data.user.name || "Signed in";
        loginBtn.classList.add("hidden");
        logoutBtn.classList.remove("hidden");
      } else {
        currentUser = null;
        userChip.innerText = "";
        loginBtn.classList.remove("hidden");
        logoutBtn.classList.add("hidden");
      }
    } catch(e) {
      currentUser = null;
    }
  }

  function openLogin(nextUrl){
    const url = `/auth/google/login?popup=true&next=${encodeURIComponent(nextUrl || window.location.pathname || "/")}`;
    const popup = window.open(url, "athoryn_google_login", "width=520,height=680");
    if(!popup){
      window.location.href = url.replace("popup=true&", "");
    }
  }

  window.addEventListener("message", async (event) => {
    if(event.data && event.data.type === "oauth_success"){
      await checkAuth();
      if(isReportingRoute() && currentUser){
        loadReportingData(1);
      }
    }
  });

  loginBtn.addEventListener("click", () => openLogin(window.location.pathname || "/"));

  logoutBtn.addEventListener("click", async () => {
    await fetch("/auth/logout", { method: "POST" });
    await checkAuth();
    if(isReportingRoute()) window.location.href = "/";
  });

  async function callAIAssistance(query){
    if(!query.trim()) return null;

    addMessage(query, "user");

    const formData = new FormData();
    formData.append("query", query);

    const res = await fetch("/post-query", {
      method: "POST",
      body: formData
    });

    if(!res.ok) throw new Error("AI assistance route failed");

    const data = await res.json();

    const analytics = data && data.status === "ok" &&
      data.results &&
      Array.isArray(data.results.data)
        ? data.results
        : null;

    if(analytics){
      appendDynamicResultBlock({
        message: null,
        type: "success",
        records: analytics.data,
        title: analytics.user_query ? `Results for: ${analytics.user_query}` : "Analytics Results",
        meta: `${analytics.data.length} records`
      });
    } else {
      addMessage(getAIContent(data), "assistant");
    }

    return data;
  }

  async function uploadFile(file){
    if(!file) return null;

    const formData = new FormData();
    formData.append("file", file);

    addMessage("Uploading file: " + file.name, "user");

    const res = await fetch("/upload", {
      method: "POST",
      body: formData
    });

    if(res.status === 401){
      openLogin("/");
      throw new Error("Please login first, then upload again.");
    }

    if(!res.ok) throw new Error("File upload failed");

    const payload = await res.json();
    const data = getUploadData(payload);

    if(data && data.status === "ALREADY_EXISTS"){
      appendResultBlock({
        message: data.message || `Data already exists for report_month ${data.report_month}. Insert skipped.`,
        type: "warning",
        records: data.sample_records || [],
        title: `Sample records for ${data.report_month}`,
        meta: `${data.existing_record_count || 0} existing records`
      });
      return payload;
    }

    if(data && data.status === "INSERTED"){
      appendResultBlock({
        message: `Data uploaded for ${data.report_month}. Inserted rows: ${data.inserted_rows}.`,
        type: "success"
      });
      return payload;
    }

    appendResultBlock({
      message: "Upload completed.",
      type: "success",
      records: data && data.sample_records ? data.sample_records : null,
      title: "Sample records"
    });

    return payload;
  }

  async function handleSubmit(){
    const query = queryEl.value.trim();
    const file = draggedFile;

    if(!query && !file){
      queryEl.focus();
      return;
    }

    queryEl.value = "";
    showFile(null);

    try {
      if(query){
        await callAIAssistance(query);
      }

      if(file){
        await uploadFile(file);
      }
    } catch(error) {
      addMessage(error.message || "Request failed", "assistant");
    }

    queryEl.focus();
  }

  sendBtn.addEventListener("click", handleSubmit);

  queryEl.addEventListener("keydown", (event) => {
    if(event.key === "Enter" && !event.shiftKey){
      event.preventDefault();
      handleSubmit();
    }
  });

  ["dragover", "dragenter"].forEach(evt => {
    composer.addEventListener(evt, (event) => {
      event.preventDefault();
      composer.classList.add("drag-over");
    });
  });

  ["dragleave", "drop"].forEach(evt => {
    composer.addEventListener(evt, (event) => {
      event.preventDefault();
      composer.classList.remove("drag-over");
    });
  });

  composer.addEventListener("drop", (event) => {
    if(event.dataTransfer.files && event.dataTransfer.files.length > 0){
      showFile(event.dataTransfer.files[0]);
    }
  });

  removeFileBtn.addEventListener("click", () => showFile(null));


  function renderReportingTable(records, title, meta){
    if(!records || records.length === 0){
      return `
        <div class="table-card">
          <div class="table-toolbar">
            <span class="table-title">${title || "Records"}</span>
            <span class="table-meta">${meta || ""}</span>
          </div>
          <div style="padding:16px;color:#6b7280;">No records found.</div>
        </div>`;
    }

    return `
      <div class="table-card">
        <div class="table-toolbar">
          <span class="table-title">${title || "Records"}</span>
          <span class="table-meta">${meta || records.length + " records"}</span>
        </div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                ${REPORTING_TABLE_COLUMNS.map(c => {
                  const active = reportingSortColumn === c.key;
                  const icon = active ? (reportingSortDirection === "asc" ? " ↑" : " ↓") : " ↕";
                  return `<th data-sort-key="${c.key}" style="cursor:pointer;user-select:none;">${c.label}${icon}</th>`;
                }).join("")}
              </tr>
            </thead>
            <tbody>
              ${records.map(row => `
                <tr>${REPORTING_TABLE_COLUMNS.map(c => `<td>${formatCell(row[c.key], c.key)}</td>`).join("")}</tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      </div>`;
  }

  function attachReportingSortEvents(){
    document.querySelectorAll("#reportingTable th[data-sort-key]").forEach(th => {
      th.addEventListener("click", () => {
        const key = th.getAttribute("data-sort-key");

        if(reportingSortColumn === key){
          reportingSortDirection = reportingSortDirection === "asc" ? "desc" : "asc";
        } else {
          reportingSortColumn = key;
          reportingSortDirection = "asc";
        }

        loadReportingData(1);
      });
    });
  }

  function escapeHtml(value){
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  async function loadReportingData(page){
    reportingPageNo = page || 1;

    const params = new URLSearchParams();
    params.set("page", reportingPageNo);
    params.set("page_size", 50);

    reportingFilters.forEach(key => {
      const el = document.getElementById("filter_" + key);
      if(el && el.value.trim()){
        params.set(key, el.value.trim());
      }
    });

    if(reportingSortColumn){
      params.set("sort_by", reportingSortColumn);
      params.set("sort_dir", reportingSortDirection);
    }

    const status = document.getElementById("reportingStatus");
    const target = document.getElementById("reportingTable");
    const summary = document.getElementById("reportingSummary");

    status.innerHTML = "";
    target.innerHTML = `
      <div class="table-card">
        <div style="padding:18px;color:#6b7280;">Loading reporting data...</div>
      </div>`;

    const res = await fetch("/api/reporting?" + params.toString());

    if(res.status === 401){
      summary.innerText = "Login required.";
      target.innerHTML = "";
      status.innerHTML = `<div class="result-note result-warning">Please login to view reporting.</div>`;
      openLogin("/reporting");
      return;
    }

    if(!res.ok){
      target.innerHTML = "";
      status.innerHTML = `<div class="result-note result-warning">Failed to load reporting data.</div>`;
      return;
    }

    const payload = await res.json();
    const data = payload.results || {};

    reportingPageNo = data.page || 1;
    reportingTotalPages = data.total_pages || 1;

    summary.innerText = `Page ${reportingPageNo} of ${reportingTotalPages} • ${data.total_count || 0} records`;
    target.innerHTML = renderReportingTable(
      data.records || [],
      "Royalty Transactions",
      `Showing ${(data.records || []).length} of ${data.total_count || 0}`
    );

    attachReportingSortEvents();

    document.getElementById("prevPageBtn").disabled = reportingPageNo <= 1;
    document.getElementById("nextPageBtn").disabled = reportingPageNo >= reportingTotalPages;
  }

  document.getElementById("applyFiltersBtn").addEventListener("click", () => loadReportingData(1));

  document.getElementById("clearFiltersBtn").addEventListener("click", () => {
    reportingFilters.forEach(key => {
      const el = document.getElementById("filter_" + key);
      if(el) el.value = "";
    });
    reportingSortColumn = "";
    reportingSortDirection = "asc";
    loadReportingData(1);
  });

  document.getElementById("prevPageBtn").addEventListener("click", () => {
    if(reportingPageNo > 1) loadReportingData(reportingPageNo - 1);
  });

  document.getElementById("nextPageBtn").addEventListener("click", () => {
    if(reportingPageNo < reportingTotalPages) loadReportingData(reportingPageNo + 1);
  });

  reportingFilters.forEach(key => {
    const el = document.getElementById("filter_" + key);
    if(el){
      el.addEventListener("keydown", (event) => {
        if(event.key === "Enter") loadReportingData(1);
      });
    }
  });

  (async function init(){
    await checkAuth();
    showCorrectPage();
    if(!isReportingRoute()){
      addMessage("Welcome to Athoryn. Ask me about royalty performance, or upload a KDP royalty statement.", "assistant");
    }
  })();
</script>
</body>
</html>

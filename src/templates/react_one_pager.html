<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Royalty Hub</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/react_one_pager.css') }}">
</head>

<body>
<div class="app">
  <div class="topbar">
    <a class="brand" href="/">The Royalty Hub</a>
    <div class="nav">
      <button id="deleteAllDataBtn" class="hidden">Delete All My Data</button>
      <a href="/reporting" id="reportingLink" class="hidden">Reporting</a>
      <span id="userChip" class="user-chip"></span>
      <button id="loginBtn">Login</button>
      <button id="logoutBtn" class="hidden">Logout</button>
    </div>
  </div>

  <main class="main">
    <section id="landingPage" class="page">
      <div id="authGate" class="auth-gate hidden">
        <button id="gateLoginBtn" class="google-login-btn" type="button" aria-label="Login with Google">G</button>
        <div class="auth-gate-message">Please login with Google before starting anything.</div>
      </div>

      <div id="chatArea" class="chat-area hidden"></div>

      <div id="composerWrap" class="composer-wrap hidden">
        <div id="composer" class="composer">
          <div id="filePill" class="file-pill">
            <span>📄</span>
            <span id="fileName" class="file-name"></span>
            <button id="removeFileBtn" class="file-remove" type="button">×</button>
          </div>
          <input id="fileInput" class="hidden" type="file" accept=".xlsx">
          <button id="attachFileBtn" class="attach-btn" type="button">+</button>
          <textarea id="query" placeholder="Ask AI, or drag an Excel file here. Press Enter to submit. Shift+Enter for new line."></textarea>
          <button id="sendBtn" class="send-btn" type="button">↑</button>
        </div>
        <div class="hint">Drop KDP or ACX royalty Excel files here, ask a question, or do both together.</div>
      </div>
    </section>

    <section id="reportingPage" class="page">
      <div class="reporting-shell">
        <div class="reporting-header">
          <div class="reporting-title">Reporting</div>

          <div class="filters">
            <div class="filter">
              <label>Report Month</label>
              <select id="filter_report_month">
                <option value="">All available months</option>
              </select>
            </div>
            <div class="filter">
              <label>Royalty Source</label>
              <select id="filter_source_platform">
                <option value="">All sources</option>
                <option value="ACX">ACX</option>
                <option value="KDP">KDP</option>
              </select>
            </div>
            <div class="filter">
              <label>Title Contains</label>
              <input id="filter_normalized_title" placeholder="example book">
            </div>
            <div class="filter">
              <label>Country</label>
              <input id="filter_country_code" placeholder="US">
            </div>
            <div class="filter">
              <label>Marketplace</label>
              <input id="filter_marketplace" placeholder="Amazon.com">
            </div>
            <div class="filter">
              <label>Currency</label>
              <input id="filter_currency" placeholder="USD">
            </div>
            <div class="filter-actions">
              <button class="primary-btn" id="applyFiltersBtn">Apply</button>
              <button class="secondary-btn" id="clearFiltersBtn">Clear</button>
            </div>
          </div>
        </div>

        <div class="reporting-content">
          <div class="pagination">
            <div id="reportingSummary">Loading records...</div>
            <div class="pager-buttons">
              <button class="secondary-btn" id="prevPageBtn">Prev</button>
              <button class="secondary-btn" id="nextPageBtn">Next</button>
            </div>
          </div>
          <div id="reportingStatus"></div>
          <div id="reportingTable" class="reporting-table-wrap"></div>
        </div>
      </div>
    </section>
  </main>

  <div id="recordOverlay" class="record-overlay hidden" role="dialog" aria-modal="true">
    <div class="record-modal">
      <div class="record-modal-header">
        <div id="recordOverlayTitle" class="record-modal-title">Royalty Record</div>
        <button id="closeRecordOverlayBtn" class="record-close-btn" type="button">×</button>
      </div>
      <div id="recordOverlayContent" class="record-modal-content"></div>
      <div class="record-modal-actions">
        <button id="deleteRecordBtn" class="danger-btn" type="button">Delete</button>
        <button id="cancelRecordBtn" class="secondary-btn" type="button">Close</button>
      </div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/react_one_pager.js') }}"></script>
</body>
</html>
